<!DOCTYPE html>
<html>
  <head>
    <title>Accelerometer Dashboard</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <h1>Real-Time Accelerometer Data</h1>

    <div class="data-box">
      <div class="data-item">
        <span class="label">X:</span>
        <span id="x-val" class="value">0</span>
      </div>

      <div class="data-item">
        <span class="label">Y:</span>
        <span id="y-val" class="value">0</span>
      </div>

      <div class="data-item">
        <span class="label">Z:</span>
        <span id="z-val" class="value">0</span>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
  </body>
</html>
